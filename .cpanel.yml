---
# cPanel Git Version Control — kopē efpic uz wp-content/plugins
# Obligāti: pirmā rinda "---" (cPanel dokumentācija).
# Pilnais ceļš uz spraudņu mapi tiešā hostinga vidē:
#   PLUGINPATH=/home2/trioitlv/edgarsfoto.lv/wp-content/plugins
deployment:
  tasks:
    - export PLUGINPATH=/home2/trioitlv/edgarsfoto.lv/wp-content/plugins
    - export LOGFILE=/home2/trioitlv/efpic-deploy.log
    - echo "==== EFPIC deploy start $(date) ====" >> $LOGFILE
    - echo "Repo $(pwd)" >> $LOGFILE
    - echo "Target $PLUGINPATH" >> $LOGFILE
    - /bin/rm -rf $PLUGINPATH/efpic $PLUGINPATH/efpic-pro || true
    - /bin/mkdir -p $PLUGINPATH/efpic $PLUGINPATH/efpic-pro
    - /bin/cp -a ./efpic/. $PLUGINPATH/efpic/
    - /bin/cp -a ./efpic-pro/. $PLUGINPATH/efpic-pro/
    - echo "efpic.php Version line:" >> $LOGFILE
    - /bin/grep -n "Version:" $PLUGINPATH/efpic/efpic.php >> $LOGFILE 2>&1 || true
    - echo "==== EFPIC deploy done $(date) ====" >> $LOGFILE
