# cPanel Git Version Control — deploy pēc "Update from Remote"
# Repozitorija sakne → wp-content/plugins/efpic un efpic-pro
deployment:
  tasks:
    - export PLUGINPATH="/home2/trioitlv/edgarsfoto.lv/wp-content/plugins"
    - export LOGFILE="$HOME/efpic-deploy.log"
    - echo "==== EFPIC deploy start: $(date) ====" >> "$LOGFILE"
    - echo "Repo: $(pwd)" >> "$LOGFILE"
    - echo "Target: $PLUGINPATH" >> "$LOGFILE"
    - mkdir -p "$PLUGINPATH/efpic" "$PLUGINPATH/efpic-pro" >> "$LOGFILE" 2>&1
    - echo "Target perms (before):" >> "$LOGFILE"; ls -ld "$PLUGINPATH/efpic" "$PLUGINPATH/efpic-pro" >> "$LOGFILE" 2>&1; ls -l "$PLUGINPATH/efpic/efpic.php" >> "$LOGFILE" 2>&1 || true
    - chmod -R u+rwX "$PLUGINPATH/efpic" "$PLUGINPATH/efpic-pro" >> "$LOGFILE" 2>&1 || true
    - if command -v rsync >/dev/null 2>&1; then echo "Using rsync" >> "$LOGFILE"; rsync -a --delete "./efpic/" "$PLUGINPATH/efpic/" >> "$LOGFILE" 2>&1; rsync -a --delete "./efpic-pro/" "$PLUGINPATH/efpic-pro/" >> "$LOGFILE" 2>&1; else echo "rsync not found, using cp" >> "$LOGFILE"; rm -rf "$PLUGINPATH/efpic" "$PLUGINPATH/efpic-pro" >> "$LOGFILE" 2>&1; cp -a "./efpic" "$PLUGINPATH/efpic" >> "$LOGFILE" 2>&1; cp -a "./efpic-pro" "$PLUGINPATH/efpic-pro" >> "$LOGFILE" 2>&1; fi
    - echo "Deployed efpic.php version line:" >> "$LOGFILE"
    - grep -n "Version:" "$PLUGINPATH/efpic/efpic.php" >> "$LOGFILE" 2>&1 || true
    - echo "deployed_at=$(date)" > "$PLUGINPATH/efpic/.deployed-from-cpanel.txt"
    - echo "repo=$(pwd)" >> "$PLUGINPATH/efpic/.deployed-from-cpanel.txt"
    - echo "head=$(git rev-parse HEAD 2>/dev/null || echo unknown)" >> "$PLUGINPATH/efpic/.deployed-from-cpanel.txt"
    - echo "efpic_php_version=$(grep -m1 \"Version:\" \"$PLUGINPATH/efpic/efpic.php\" 2>/dev/null || echo unknown)" >> "$PLUGINPATH/efpic/.deployed-from-cpanel.txt"
    - echo "deployed_at=$(date)" > "$PLUGINPATH/efpic-pro/.deployed-from-cpanel.txt"
    - echo "repo=$(pwd)" >> "$PLUGINPATH/efpic-pro/.deployed-from-cpanel.txt"
    - echo "head=$(git rev-parse HEAD 2>/dev/null || echo unknown)" >> "$PLUGINPATH/efpic-pro/.deployed-from-cpanel.txt"
    - echo "deploy_marker=$(date +%s)" > "$PLUGINPATH/efpic/.deploy-marker-$(date +%s).txt" || true
    - echo "deploy_marker=$(date +%s)" > "$PLUGINPATH/efpic-pro/.deploy-marker-$(date +%s).txt" || true
    - echo "==== EFPIC deploy done: $(date) ====" >> "$LOGFILE"
